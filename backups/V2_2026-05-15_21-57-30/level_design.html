  // ── MODAL ───────────────────────────────────────────────────────────────────
  const COLORS = ['#6366f1','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#cbd5e1','#64748b'];
  function showModal({ title, fields, onOk }) {
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    let bodyHtml = `<h3>${title}</h3>`;
    fields.forEach(f => {
      if(f.type === 'text' || f.type === 'textarea') {
        bodyHtml += `<label>${f.label}</label>`;
        bodyHtml += f.type === 'textarea' ? `<textarea id="mf_${f.id}" placeholder="${f.placeholder||''}">${f.value||''}</textarea>` : `<input id="mf_${f.id}" type="text" placeholder="${f.placeholder||''}" value="${f.value||''}">`;
      } else if(f.type === 'color') {
        bodyHtml += `<label>${f.label}</label><div class="modal-colors">`;
        COLORS.forEach(c => { bodyHtml += `<div class="cp-swatch ${f.value===c?'selected':''}" data-c="${c}" style="background:${c}"></div>`; });
        bodyHtml += `</div>`;
      }
    });
    bodyHtml += `<div class="modal-actions"><button class="btn-cancel">Отмена</button><button class="btn-ok">OK</button></div>`;
    const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = bodyHtml;
    overlay.appendChild(modal); document.body.appendChild(overlay);

    let selectedColor = fields.find(f=>f.type==='color')?.value || COLORS[0];
    modal.querySelectorAll('.modal-colors .cp-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        modal.querySelectorAll('.modal-colors .cp-swatch').forEach(x=>x.classList.remove('selected'));
        sw.classList.add('selected'); selectedColor = sw.dataset.c;
      });
    });

    modal.querySelector('.btn-cancel').onclick = () => overlay.remove();
    modal.querySelector('.btn-ok').onclick = () => {
      const vals = {};
      fields.forEach(f => { if(f.type==='color') vals[f.id] = selectedColor; else vals[f.id] = document.getElementById('mf_'+f.id)?.value || ''; });
      overlay.remove(); onOk(vals);
    };
    overlay.addEventListener('mousedown', e => { if(e.target===overlay) overlay.remove(); });
    const firstInput = modal.querySelector('input, textarea'); if(firstInput) setTimeout(()=>firstInput.focus(),50);
  }

  // ── SIDEBAR (scene navigator + templates) ───────────────────────────────────
  // Dialogues table
  function attrEsc(s) { return esc(s).replace(/"/g, '&quot;'); }
  function stripDialogueQuotes(s) {
    return String(s || '').trim().replace(/^[«"“”„]+/, '').replace(/[»"“”]+$/, '').trim();
  }
  function splitDialogueLine(line) {
    const text = String(line || '').trim();
    const m = text.match(/^([^:]{1,48}):\s*(.*)$/);
    if (!m) return { speaker: '', text };
    return { speaker: m[1].trim(), text: stripDialogueQuotes(m[2]) };
  }
  function buildDialogueLine(row) {
    const text = String(row.text || '').trim();
    const speaker = String(row.speaker || '').trim();
    if (!text) return '';
    return speaker ? `${speaker}: ${text}` : text;
  }
  function speakerClass(speaker) {
    const s = String(speaker || '').toLowerCase();
    if (s.includes('мэг') || s.includes('meg')) return 'speaker-meg';
    if (s.includes('джек') || s.includes('jack')) return 'speaker-jack';
    if (s.includes('стив') || s.includes('steve')) return 'speaker-steve';
    if (s.includes('eyesys') || s.includes('система')) return 'speaker-eyesys';
    return 'speaker-unknown';
  }
  function isEyesysRow(row) {
    return /eyesys|система/i.test(`${row.speaker || ''} ${row.text || ''}`);
  }
  function sourceLabel(layerId) {
    return layerId === 'story' ? 'Story' : 'Dialogues';
  }
  function sourceClass(layerId) {
    return layerId === 'story' ? 'dialogue-source-story' : 'dialogue-source-dialogues';
  }
  function layerDefById(layerId) {
    return LAYER_DEFS.find(layer => layer.id === layerId) || { id: layerId, name: layerId, color: '#9ca3af', icon: 'notes' };
  }
  function showDialogueContext(row, triggerBtn) {
    const scene = project.scenes.find(s => s.id === row.sceneId);
    const node = scene && scene.nodes.find(n => n.id === row.nodeId);
    const icon = triggerBtn && triggerBtn.querySelector('.material-symbols-outlined');
    if (icon) icon.textContent = 'visibility_off';

    const overlay = document.createElement('div');
    overlay.className = 'dialogue-context-overlay';
    const layerOrder = ['gameplay', 'narrative', 'story', 'dialogues', 'emotion', 'eyesys', 'sounds'];
    const sections = node && node.layers ? layerOrder
      .map(layerId => ({ def: layerDefById(layerId), data: node.layers[layerId] }))
      .filter(x => x.data && String(x.data.content || '').trim())
      .map(x => `
        <section class="dialogue-context-section">
          <h4 style="color:${x.def.color}">
            <span class="material-symbols-outlined">${esc(x.def.icon)}</span>
            ${esc(x.def.name)}
          </h4>
          <pre>${esc(x.data.content)}</pre>
        </section>
      `).join('') : '';
    const speaker = String(row.speaker || '').trim();
    const quote = speaker ? `${speaker}: ${row.text || ''}` : (row.text || '');

    overlay.innerHTML = `
      <div class="modal dialogue-context-modal">
        <div class="dialogue-context-head">
          <h3>Контекст реплики</h3>
          <button class="dialogue-btn btn-context-close" title="Закрыть контекст">
            <span class="material-symbols-outlined">visibility_off</span>Close
          </button>
        </div>
        <div class="dialogue-context-body">
          <div class="dialogue-context-meta">
            <strong>Scene:</strong> ${esc(scene ? scene.title : row.sceneTitle)}<br>
            <strong>Event:</strong> ${esc(node ? node.title : row.eventTitle)}<br>
            <strong>Source:</strong> ${esc(row.source)}
          </div>
          <div class="dialogue-context-quote">${esc(quote)}</div>
          ${sections || '<div class="dialogue-empty">No context layers found.</div>'}
        </div>
      </div>
    `;

    function close() {
      overlay.remove();
      document.removeEventListener('keydown', onKey);
      if (icon) icon.textContent = 'visibility';
    }
    function onKey(e) { if (e.key === 'Escape') close(); }

    overlay.querySelector('.btn-context-close').onclick = close;
    overlay.addEventListener('mousedown', e => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', onKey);
    document.body.appendChild(overlay);
  }
  function isLikelyDialogueSpeaker(speaker) {
    return /мэг|джек|стив|eyesys|система|голос|тотем|meg|jack|steve/i.test(String(speaker || ''));
  }
  function shouldCollectLayerLine(layerId, parsed) {
    if (layerId === 'dialogues') return true;
    return isLikelyDialogueSpeaker(parsed.speaker);
  }
  function isDialogueContinuationLine(line, previousMoved) {
    return previousMoved && /^[«"“„]/.test(String(line || '').trim());
  }
  function migrateStoryDialoguesToDialogues({ silent = false, force = false } = {}) {
    if (!project || (!force && project._storyDialoguesMigratedV1)) return 0;
    const backup = deepClone(project);
    let moved = 0;

    (project.scenes || []).forEach(scene => {
      (scene.nodes || []).forEach(node => {
        if (!node.layers || !node.layers.story || !node.layers.story.content) return;
        const storyLines = String(node.layers.story.content).split(/\r?\n/);
        const keptStoryLines = [];
        const movedLines = [];
        let previousMoved = false;

        storyLines.forEach(line => {
          const trimmed = String(line || '').trim();
          const parsed = splitDialogueLine(trimmed);
          const shouldMove = trimmed && (shouldCollectLayerLine('story', parsed) || isDialogueContinuationLine(trimmed, previousMoved));

          if (shouldMove) {
            movedLines.push(trimmed);
            moved++;
            previousMoved = true;
          } else {
            keptStoryLines.push(line);
            previousMoved = false;
          }
        });

        if (!movedLines.length) return;
        if (!node.layers.dialogues) node.layers.dialogues = { content: '', comments: [], beats: [] };
        const existingLines = String(node.layers.dialogues.content || '').split(/\r?\n/).filter(line => line.trim());
        const existingSet = new Set(existingLines.map(line => line.trim()));
        movedLines.forEach(line => {
          if (!existingSet.has(line)) {
            existingLines.push(line);
            existingSet.add(line);
          }
        });
        node.layers.dialogues.content = existingLines.join('\n');
        node.layers.story.content = keptStoryLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
      });
    });

    project._storyDialoguesMigratedV1 = true;
    if (moved > 0) {
      localStorage.setItem('ld_story_dialogue_migration_backup', JSON.stringify({
        createdAt: new Date().toISOString(),
        project: backup
      }));
      if (!silent) alert(`Перенесено реплик из Истории в Диалоги: ${moved}`);
    }
    return moved;
  }
  function collectDialogueRows() {
    const rows = [];
    (project.scenes || []).forEach(scene => {
      (scene.nodes || []).forEach(node => {
        ['dialogues', 'story'].forEach(layerId => {
          const layer = node.layers && node.layers[layerId];
          const content = layer && layer.content ? String(layer.content) : '';
          if (!content.trim()) return;
          content.split(/\r?\n/).forEach((line, lineIndex) => {
            if (!line.trim()) return;
            const parsed = splitDialogueLine(line);
            if (!shouldCollectLayerLine(layerId, parsed)) return;
            rows.push({
              id: `${scene.id}__${node.id}__${layerId}__${lineIndex}`,
              sceneId: scene.id,
              nodeId: node.id,
              layerId,
              lineIndex,
              sceneTitle: scene.title || scene.id,
              eventTitle: node.title || node.id,
              source: sourceLabel(layerId),
              speaker: parsed.speaker,
              text: parsed.text,
              deleted: false
            });
          });
        });
      });
    });
    return rows;
  }
  function csvCell(v) {
    const s = String(v == null ? '' : v);
    return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }
  function rowsToCsv(rows) {
    const header = ['KEY','SCENE','EVENT','SOURCE','SPEAKER','TEXT'];
    const body = rows
      .filter(r => !r.deleted)
      .map(r => [r.id, r.sceneTitle, r.eventTitle, r.source, r.speaker, r.text].map(csvCell).join(','));
    return [header.join(','), ...body].join('\r\n') + '\r\n';
  }
  function downloadText(filename, text, type = 'text/csv;charset=utf-8') {
    const blob = new Blob([text], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  function dateStamp() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}`;
  }
  function applyDialogueRows(rows) {
    const touched = new Set(rows.map(r => `${r.sceneId}__${r.nodeId}__${r.layerId}`));
    touched.forEach(key => {
      const [sceneId, nodeId, layerId] = key.split('__');
      const scene = project.scenes.find(s => s.id === sceneId);
      const node = scene && scene.nodes.find(n => n.id === nodeId);
      if (!node) return;
      const group = rows
        .filter(r => r.sceneId === sceneId && r.nodeId === nodeId && r.layerId === layerId)
        .sort((a, b) => a.lineIndex - b.lineIndex);
      if (!node.layers) node.layers = {};
      if (!node.layers[layerId]) node.layers[layerId] = { content: '', comments: [], beats: [] };
      const lines = String(node.layers[layerId].content || '').split(/\r?\n/);
      group.forEach(row => {
        lines[row.lineIndex] = row.deleted ? null : buildDialogueLine(row);
      });
      node.layers[layerId].content = lines.filter(line => line !== null).join('\n');
    });
    commitState();
    renderAll();
  }
  function openDialoguesTable() {
    const rows = collectDialogueRows();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const scenes = [...new Set(rows.map(r => r.sceneTitle))];
    const modal = document.createElement('div');
    modal.className = 'modal dialogue-modal';
    modal.innerHTML = `
      <div class="dialogue-head">
        <h3><span class="material-symbols-outlined">table_chart</span>Dialogues Table <span class="dialogue-count"></span></h3>
        <button class="dialogue-btn btn-close"><span class="material-symbols-outlined">close</span>Close</button>
      </div>
      <div class="dialogue-tools">
        <input class="dlg-search" type="text" placeholder="Search key, scene, event, speaker, text">
        <select class="dlg-scene">
          <option value="">All scenes</option>
          ${scenes.map(s => `<option value="${attrEsc(s)}">${esc(s)}</option>`).join('')}
        </select>
        <select class="dlg-eye">
          <option value="all">EYESYS: show</option>
          <option value="hide">EYESYS: hide</option>
          <option value="only">EYESYS: only</option>
        </select>
        <select class="dlg-source">
          <option value="">All sources</option>
          <option value="dialogues">Dialogues</option>
          <option value="story">Story</option>
        </select>
        <button class="dialogue-btn btn-export"><span class="material-symbols-outlined">file_download</span>Export CSV</button>
        <button class="dialogue-btn btn-backup"><span class="material-symbols-outlined">save</span>Backup CSV</button>
        <button class="dialogue-btn btn-undo"><span class="material-symbols-outlined">undo</span>Undo App</button>
      </div>
      <div class="dialogue-table-wrap"></div>
      <div class="dialogue-foot">
        <div class="dialogue-hint">Delete is soft until Save. App undo works after saved table changes.</div>
        <div>
          <button class="dialogue-btn btn-cancel">Cancel</button>
          <button class="dialogue-btn primary btn-save"><span class="material-symbols-outlined">check</span>Save Changes</button>
        </div>
      </div>
    `;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    const wrap = modal.querySelector('.dialogue-table-wrap');
    const search = modal.querySelector('.dlg-search');
    const sceneFilter = modal.querySelector('.dlg-scene');
    const eyeFilter = modal.querySelector('.dlg-eye');
    const sourceFilter = modal.querySelector('.dlg-source');
    const count = modal.querySelector('.dialogue-count');

    function filteredRows() {
      const q = search.value.trim().toLowerCase();
      const scene = sceneFilter.value;
      const eyeMode = eyeFilter.value;
      const sourceMode = sourceFilter.value;
      return rows
        .map((row, idx) => ({ row, idx }))
        .filter(({ row }) => !scene || row.sceneTitle === scene)
        .filter(({ row }) => !sourceMode || row.layerId === sourceMode)
        .filter(({ row }) => eyeMode === 'all' || (eyeMode === 'hide' ? !isEyesysRow(row) : isEyesysRow(row)))
        .filter(({ row }) => {
          if (!q) return true;
          return [row.id, row.sceneTitle, row.eventTitle, row.speaker, row.text]
            .some(v => String(v || '').toLowerCase().includes(q));
        });
    }
    function renderRows() {
      const visible = filteredRows();
      count.textContent = `${visible.filter(x => !x.row.deleted).length} / ${rows.length}`;
      if (!visible.length) {
        wrap.innerHTML = '<div class="dialogue-empty">No dialogues found.</div>';
        return;
      }
      wrap.innerHTML = `
        <table class="dialogue-table">
          <thead>
            <tr>
              <th class="col-scene">Scene</th>
              <th class="col-event">Event</th>
              <th class="col-source">Source</th>
              <th class="col-speaker">Speaker</th>
              <th class="col-line">Dialogue</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody>
            ${visible.map(({ row, idx }) => `
              <tr class="${row.deleted ? 'deleted' : ''}" data-ridx="${idx}">
                <td><div class="dialogue-cell-muted">${esc(row.sceneTitle)}</div></td>
                <td><div class="dialogue-cell-muted">${esc(row.eventTitle)}</div></td>
                <td><span class="dialogue-source ${sourceClass(row.layerId)}">${esc(row.source)}</span></td>
                <td><input class="dlg-speaker ${speakerClass(row.speaker)}" value="${attrEsc(row.speaker)}"></td>
                <td><textarea class="dlg-text">${esc(row.text)}</textarea></td>
                <td class="col-actions">
                  <div class="dialogue-row-actions">
                    <button class="dialogue-btn dialogue-icon-btn btn-row-context" title="Показать контекст сцены"><span class="material-symbols-outlined">visibility</span></button>
                    <button class="dialogue-btn danger btn-row-delete">${row.deleted ? 'Restore' : 'Delete'}</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      wrap.querySelectorAll('tr[data-ridx]').forEach(tr => {
        const row = rows[Number(tr.dataset.ridx)];
        tr.querySelector('.dlg-speaker').addEventListener('input', e => {
          row.speaker = e.target.value;
          e.target.className = `dlg-speaker ${speakerClass(row.speaker)}`;
        });
        tr.querySelector('.dlg-text').addEventListener('input', e => { row.text = e.target.value; });
        tr.querySelector('.btn-row-context').addEventListener('click', e => {
          showDialogueContext(row, e.currentTarget);
        });
        tr.querySelector('.btn-row-delete').addEventListener('click', () => {
          row.deleted = !row.deleted;
          renderRows();
        });
      });
    }

    search.addEventListener('input', renderRows);
    sceneFilter.addEventListener('change', renderRows);
    eyeFilter.addEventListener('change', renderRows);
    sourceFilter.addEventListener('change', renderRows);
    modal.querySelector('.btn-close').onclick = () => overlay.remove();
    modal.querySelector('.btn-cancel').onclick = () => overlay.remove();
    modal.querySelector('.btn-export').onclick = () => downloadText(`ABERRATION_dialogues_export_${dateStamp()}.csv`, rowsToCsv(rows));
    modal.querySelector('.btn-backup').onclick = () => {
      const csv = rowsToCsv(rows);
      localStorage.setItem('ld_dialogues_backup', JSON.stringify({ createdAt: new Date().toISOString(), csv }));
      downloadText(`ABERRATION_dialogues_backup_${dateStamp()}.csv`, csv);
    };
    modal.querySelector('.btn-undo').onclick = () => {
      undo();
      overlay.remove();
      openDialoguesTable();
    };
    modal.querySelector('.btn-save').onclick = () => {
      applyDialogueRows(rows);
      overlay.remove();
    };
    overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });
    renderRows();
    setTimeout(() => search.focus(), 50);
  }

  function renderSidebar() {
    const scenesContainer = document.getElementById('scenes-container');
    const templatesContainer = document.getElementById('templates-container');
    scenesContainer.innerHTML = '';
    templatesContainer.innerHTML = '';

    project.scenes.forEach(scene => {
      const filled = scene.nodes.length > 0 && !scene.nodes.every(n => (n.title||'').startsWith('[TODO]'));
      const isActive = scene.id === project.activeSceneId;
      const expanded = !!scene._expanded;

      const el = document.createElement('div');
      el.className = 'scene-item' + (isActive ? ' active' : '');
      el.dataset.sceneId = scene.id;

      el.innerHTML = `
        <div class="scene-header">
          <span class="material-symbols-outlined scene-arrow ${expanded ? 'open' : ''}">chevron_right</span>
          <span class="material-symbols-outlined scene-status" style="color:${filled ? '#10b981' : '#6b7280'}">${filled ? 'check_circle' : 'radio_button_unchecked'}</span>
          <span class="scene-title">${esc(scene.title)}</span>
          <span class="scene-count">${scene.nodes.length}</span>
          <button class="scene-del" title="Удалить сцену"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="scene-body" style="display:${expanded ? 'block' : 'none'}">
          <div class="layers-title">Слои</div>
          ${LAYER_DEFS.map(layer => {
            const checked = (scene.visibleLayers||[]).includes(layer.id);
            return `<label class="layer-toggle">
              <input type="checkbox" data-layer="${layer.id}" ${checked ? 'checked' : ''}>
              <span class="material-symbols-outlined" style="color:${layer.color}">${layer.icon}</span>
              <span>${esc(layer.name)}</span>
            </label>`;
          }).join('')}
        </div>
      `;

      const header = el.querySelector('.scene-header');
      header.addEventListener('click', e => {
        if (e.target.closest('.scene-del')) return;
        if (e.target.closest('.scene-arrow')) {
          scene._expanded = !scene._expanded; renderSidebar(); return;
        }
        if (project.activeSceneId !== scene.id) {
          project.activeSceneId = scene.id;
          view = { x: 40, y: 40, zoom: 0.85 }; applyView();
          save(); renderAll();
        } else {
          scene._expanded = !scene._expanded; renderSidebar();
        }
      });

      el.querySelector('.scene-del').addEventListener('click', e => {
        e.stopPropagation();
        if (project.scenes.length <= 1) { alert('Нельзя удалить последнюю сцену.'); return; }
        if (!confirm(`Удалить сцену «${scene.title}»? Все её события и связи потеряются.`)) return;
        const idx = project.scenes.findIndex(s => s.id === scene.id);
        project.scenes = project.scenes.filter(s => s.id !== scene.id);
        if (project.activeSceneId === scene.id) {
          project.activeSceneId = project.scenes[Math.max(0, idx-1)].id;

      el.querySelectorAll('.layer-toggle input').forEach(input => {
        input.addEventListener('change', () => {
          const lid = input.dataset.layer;
          if (input.checked) { if (!scene.visibleLayers.includes(lid)) scene.visibleLayers.push(lid); }
          else { scene.visibleLayers = scene.visibleLayers.filter(x => x !== lid); }
          commitState(); renderBoard();
        });
        input.addEventListener('click', e => e.stopPropagation());
      });

      scenesContainer.appendChild(el);
    });

    // Templates
    (project.templates || DEFAULT_TEMPLATES).forEach(tpl => {
      const c = document.createElement('div'); c.className = 'tpl-card';
      c.innerHTML = `<span class="material-symbols-outlined">${tpl.icon}</span><span>${esc(tpl.name)}</span>`;
      c.addEventListener('mousedown', e => {
        ip.mode = 'spawnTpl'; ip.sourceTpl = tpl;
        ghost.style.display = 'block'; ghost.style.borderColor = 'var(--primary)';
        document.getElementById('gc-title').textContent = tpl.name;
        document.getElementById('gc-desc').textContent = tpl.kind === 'event' ? 'Событие со всеми вкл-слоями' : 'Текстовая метка';
        ghost.style.left = (e.clientX - ghost.offsetWidth/2) + 'px'; ghost.style.top = (e.clientY-10) + 'px';
      });
      templatesContainer.appendChild(c);
    });
  }

  function renderToolbar() {
    const scene = getActiveScene();
    document.getElementById('scene-title-text').textContent = scene ? scene.title : '—';
  }

  // ── SCENE OPERATIONS ────────────────────────────────────────────────────────
  function addScene() {
    showModal({ title: 'Новая сцена', fields: [
      { id:'title', type:'text', label:'Название', placeholder:'Например: 10. Эпилог' },
      { id:'color', type:'color', label:'Цвет', value: '#6366f1' }
    ], onOk: vals => {
      if (!vals.title.trim()) return;
      const id = 'scene_' + guid();
      const emptyLayers = {}; DEFAULT_LAYER_IDS.forEach(lid => emptyLayers[lid] = { content:'', comments:[] });
      const todoNode = { id: id+'_todo', x: 60, y: 100, title: '[TODO] Заполнить событие', color: '#64748b', comments: [], layers: emptyLayers };
      project.scenes.push({
        id, title: vals.title.trim(), color: vals.color,
        visibleLayers: [...DEFAULT_LAYER_IDS],
        nodes: [todoNode], edges: [], texts: []
      });
      project.activeSceneId = id;
      commitState(); renderAll();
    }});
  }

  // ── CANVAS RENDER ───────────────────────────────────────────────────────────
  function renderBoard() {
    [...canvas.querySelectorAll('.node')].forEach(n=>n.remove());
    [...canvas.querySelectorAll('.text-node')].forEach(n=>n.remove());
    const scene = getActiveScene(); if (!scene) { renderEdges(); return; }
    if (!scene.texts) scene.texts = [];
    scene.nodes.forEach(renderNode);
    scene.texts.forEach(renderTextNode);
    renderEdges();
  }

  function renderTextNode(t) {
    const el = document.createElement('div');
    el.className = 'text-node'; el.dataset.tid = t.id;
    el.style.left = t.x + 'px'; el.style.top = t.y + 'px';
    el.style.width = t.w + 'px'; el.style.height = t.h + 'px';
    el.innerHTML = `
      <div class="drag-handle" title="Перетащить"><div class="drag-ribs"></div></div>
      <div class="port in" data-port="in"></div><div class="port out" data-port="out"></div>
      <div class="text-node-toolbar">
        <button class="tn-btn tn-smaller" title="Меньше">A-</button>
        <span style="font-size:10px;color:#6b7280;min-width:28px;text-align:center">${t.fontSize}px</span>
        <button class="tn-btn tn-larger" title="Больше">A+</button>
        <button class="tn-btn tn-edit" title="Редактировать">✏</button>
        <button class="tn-btn tn-del" title="Удалить">✕</button>
      </div>
      <div class="text-node-content" contenteditable="false" spellcheck="false" data-placeholder="Заголовок..." style="font-size:${t.fontSize}px;color:${t.color||'#f3f4f6'}">${esc(t.content)}</div>
      <div class="text-resize-handle"></div>
    `;

    const content = el.querySelector('.text-node-content');
    const sizeLabel = el.querySelector('.text-node-toolbar span');

    function enterEdit() {
      el.classList.add('editing');
      content.contentEditable = 'true';
      content.focus();
      const r = document.createRange(); const s = window.getSelection();
      r.selectNodeContents(content); r.collapse(false);
      s.removeAllRanges(); s.addRange(r);
    }
    function exitEdit() {
      content.contentEditable = 'false';
      el.classList.remove('editing');
      t.content = content.textContent; commitState();
    }

    const sceneRef = getActiveScene();

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.port')) return;
      if (e.target.closest('.tn-btn') || e.target.closest('.text-resize-handle')) return;
      if (el.classList.contains('editing')) return;
      e.stopPropagation(); e.preventDefault();

      if (!e.shiftKey && !el.classList.contains('selected')) {
        document.querySelectorAll('.text-node.selected, .node.selected').forEach(x=>x.classList.remove('selected'));
      }
      if (e.shiftKey) {
        el.classList.toggle('selected');
        if (!el.classList.contains('selected')) return;
      } else {
        el.classList.add('selected');
      }

      const selected = document.querySelectorAll('.text-node.selected, .node.selected');
      const multiNodes = [];
      selected.forEach(nodeEl => {
        const id = nodeEl.dataset.id || nodeEl.dataset.tid;
        const isTx = nodeEl.classList.contains('text-node');
        const it = isTx ? sceneRef.texts.find(x=>x.id===id) : sceneRef.nodes.find(x=>x.id===id);
        if(it) multiNodes.push({ item: it, origX: it.x, origY: it.y, dom: nodeEl, isNode: !isTx });
      });

      ip = { mode: 'dragMulti', startX: e.clientX, startY: e.clientY, multiNodes, dropTarget: null };
    });

    el.addEventListener('dblclick', e => {
      if (e.target.closest('.tn-btn') || e.target.closest('.text-resize-handle') || e.target.closest('.drag-handle') || e.target.closest('.port')) return;
      e.stopPropagation();
      ip.mode = null;
      enterEdit();
    });

    el.querySelector('.text-resize-handle').addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      ip = { mode: 'resizeText', activeId: t.id, startX: e.clientX, startY: e.clientY, origW: t.w, origH: t.h, origFS: t.fontSize };
    });

    el.querySelector('.tn-smaller').addEventListener('click', e => {
      e.stopPropagation();
      t.fontSize = Math.max(10, t.fontSize - 4);
      content.style.fontSize = t.fontSize + 'px';
      sizeLabel.textContent = t.fontSize + 'px';
      commitState();
    });
    el.querySelector('.tn-larger').addEventListener('click', e => {
      e.stopPropagation();
      t.fontSize = Math.min(200, t.fontSize + 4);
      content.style.fontSize = t.fontSize + 'px';
      sizeLabel.textContent = t.fontSize + 'px';
      commitState();
    });
    el.querySelector('.tn-edit').addEventListener('click', e => {
      e.stopPropagation(); enterEdit();
    });
    el.querySelector('.tn-del').addEventListener('click', e => {
      e.stopPropagation();
      sceneRef.texts = sceneRef.texts.filter(x => x.id !== t.id);
      commitState(); renderBoard();
    });

    content.addEventListener('blur', exitEdit);
    content.addEventListener('keydown', e => { if(e.key === 'Escape') { exitEdit(); content.blur(); } });

    el.querySelectorAll('.port').forEach(p=>{
      p.addEventListener('mousedown',e=>{
        e.stopPropagation(); e.preventDefault();
        if(p.dataset.port==='out'){ip.mode='drawEdge';ip.activeId=t.id;}
      });
      p.addEventListener('mouseup',e=>{
        e.stopPropagation();
        if(ip.mode==='drawEdge'&&p.dataset.port==='in'&&ip.activeId!==t.id){
          if(!sceneRef.edges.some(ed=>ed.from===ip.activeId&&ed.to===t.id)){sceneRef.edges.push({from:ip.activeId,to:t.id});commitState();}
        }
        ip.mode=null; renderEdges();
      });
    });

    canvas.appendChild(el);
  }

  function renderNode(n) {
    const scene = getActiveScene(); if (!scene) return;
    const el = document.createElement('div'); el.className = 'node'; el.dataset.id = n.id;
    el.style.left = n.x+'px'; el.style.top = n.y+'px';

    const hasEdges = scene.edges.some(e=>e.from===n.id||e.to===n.id);
    if (!n.layers) n.layers = {};

    // Block 0 = parent (title/color/comments, no content)
    // Blocks 1..N = visible layers (filtered by scene.visibleLayers, in LAYER_DEFS order)
    const visibleLayerIds = scene.visibleLayers || DEFAULT_LAYER_IDS;
    const layerBlocks = LAYER_DEFS.filter(l => visibleLayerIds.includes(l.id));

    let html = '<div class="drag-handle" title="Перетащить"><div class="drag-ribs"></div></div>';

    // ── parent block ──
    const parentComments = (n.comments||[]).map((txt,ci) =>
      `<div class="comment-block" data-target="parent" data-cidx="${ci}" contenteditable="true" spellcheck="false">${esc(txt)}</div>`
    ).join('');
    const parentBtns = (hasEdges ? `<button class="n-unlink btn-unlink-edges" title="Отвязать связи"><span class="material-symbols-outlined">link_off</span></button>` : '') + `<button class="n-del btn-del-node" title="Удалить событие"><span class="material-symbols-outlined">close</span></button>`;
    html += `<div class="n-block" style="border-left-color:${n.color}">
      <div class="n-header">
        <div class="color-dot" data-target="parent" style="background:${n.color}" title="Цвет"></div>
        <div class="n-title" data-target="parent" contenteditable="true" spellcheck="false">${esc(n.title)}</div>
        ${parentBtns}
      </div>
      <div class="n-body">
        <div class="n-comments">${parentComments}</div>
        <button class="btn-add-comment" data-target="parent">+ Комментарий</button>
      </div>
    </div>`;

    // ── layer blocks ──
    layerBlocks.forEach(layer => {
      if (!n.layers[layer.id]) n.layers[layer.id] = { content: '', comments: [], beats: [] };
      const data = n.layers[layer.id];
      if (!data.beats) data.beats = [];
      html += `<div class="n-link"></div>`;
      const cmts = (data.comments||[]).map((txt,ci) =>
        `<div class="comment-block" data-target="layer" data-layer="${layer.id}" data-cidx="${ci}" contenteditable="true" spellcheck="false">${esc(txt)}</div>`
      ).join('');
      const beatsHtml = data.beats.map((b, bi) =>
        `<div class="beat-card" data-beat-idx="${bi}" data-layer="${layer.id}">
          <span class="beat-num">${String(bi+1).padStart(2,'0')}</span>
          <div class="beat-text" data-beat-idx="${bi}" data-layer="${layer.id}" contenteditable="true" spellcheck="false">${esc(b)}</div>
          <button class="beat-del" data-beat-idx="${bi}" data-layer="${layer.id}" title="Удалить бит"><span class="material-symbols-outlined">close</span></button>
        </div>`
      ).join('');
      html += `<div class="n-block" style="border-left-color:${layer.color}">
        <div class="n-header">
          <span class="n-icon" style="color:${layer.color}">${esc(layer.icon)}</span>
          <div class="n-title-readonly">${esc(layer.name)}</div>
        </div>
        <div class="n-body">
          <div class="n-desc" data-target="layer" data-layer="${layer.id}" contenteditable="true" spellcheck="false">${esc(data.content)}</div>
          <div class="beats-list" data-layer="${layer.id}">${beatsHtml}</div>
          <button class="btn-add-beat" data-layer="${layer.id}">+ Бит</button>
          <div class="n-comments">${cmts}</div>
          <button class="btn-add-comment" data-target="layer" data-layer="${layer.id}">+ Комментарий</button>
        </div>
      </div>`;
    });

    html += `<div class="port in" data-port="in"></div><div class="port out" data-port="out"></div>`;
    el.innerHTML = html;

    function getDataRef(target, layerId) {
      if (target === 'parent') return n;
      const ref = n.layers[layerId] = n.layers[layerId] || { content:'', comments:[], beats:[] };
      if (!ref.beats) ref.beats = [];
      return ref;
    }

    el.addEventListener('mousedown', e => {
      if(e.target.closest('.n-title,.n-desc,.comment-block,.color-dot,.n-del,.n-unlink,.btn-add-comment,.beat-text,.beat-del,.btn-add-beat,.port')) return;
      e.stopPropagation(); e.preventDefault();

      if (!e.shiftKey && !el.classList.contains('selected')) {
        document.querySelectorAll('.text-node.selected, .node.selected').forEach(x=>x.classList.remove('selected'));
      }
      if (e.shiftKey) {
        el.classList.toggle('selected');
        if (!el.classList.contains('selected')) return;
      } else {
        el.classList.add('selected');
      }

      const selected = document.querySelectorAll('.text-node.selected, .node.selected');
      const multiNodes = [];
      selected.forEach(nodeEl => {
        const id = nodeEl.dataset.id || nodeEl.dataset.tid;
        const isTx = nodeEl.classList.contains('text-node');
        const it = isTx ? scene.texts.find(x=>x.id===id) : scene.nodes.find(x=>x.id===id);
        if(it) multiNodes.push({ item: it, origX: it.x, origY: it.y, dom: nodeEl, isNode: !isTx });
      });

      ip = { mode:'dragMulti', startX:e.clientX, startY:e.clientY, multiNodes, dropTarget:null };
    });

    el.querySelectorAll('.color-dot').forEach(dot => {
      dot.addEventListener('click', e => {
        e.stopPropagation();
        colorPicker.style.display = 'flex'; colorPicker.style.left = e.clientX+'px'; colorPicker.style.top = (e.clientY+15)+'px';
        cpCallback = col => { n.color = col; commitState(); renderBoard(); };
      });
    });

    el.querySelectorAll('.n-title[data-target],.n-desc[data-target]').forEach(txtEl => {
      txtEl.addEventListener('mousedown', e=>e.stopPropagation());
      txtEl.addEventListener('blur', () => {
        const target = txtEl.dataset.target;
        if (target === 'parent') {
          if (txtEl.classList.contains('n-title')) n.title = txtEl.textContent;
        } else {
          const ref = getDataRef('layer', txtEl.dataset.layer);
          if (txtEl.classList.contains('n-desc')) ref.content = txtEl.textContent;
        }
        commitState(); renderEdges(); renderSidebar();
      });
    });

    el.querySelectorAll('.comment-block').forEach(cb => {
      cb.addEventListener('mousedown', e=>e.stopPropagation());
      cb.addEventListener('blur', () => {
        const ref = getDataRef(cb.dataset.target, cb.dataset.layer);
        const ci = parseInt(cb.dataset.cidx);
        if (!ref.comments) ref.comments = [];
        if (cb.textContent.trim()==='') { ref.comments.splice(ci,1); renderBoard(); commitState(); }
        else { ref.comments[ci] = cb.textContent; commitState(); }
      });
    });

    el.querySelectorAll('.btn-add-comment').forEach(btn => {
      btn.addEventListener('click', () => {
        const ref = getDataRef(btn.dataset.target, btn.dataset.layer);
        if (!ref.comments) ref.comments = [];
        ref.comments.push(''); commitState(); renderBoard();
        const sel = btn.dataset.target === 'parent'
          ? `.comment-block[data-target="parent"]`
          : `.comment-block[data-target="layer"][data-layer="${btn.dataset.layer}"]`;
        const blocks = [...canvas.querySelector(`.node[data-id="${n.id}"]`).querySelectorAll(sel)];
        setTimeout(() => blocks[blocks.length-1] && blocks[blocks.length-1].focus(), 50);
      });
    });

    // ── beats ─────────────────────────────────────────────────────────────────
    el.querySelectorAll('.beat-text').forEach(bt => {
      bt.addEventListener('mousedown', e => e.stopPropagation());
      bt.addEventListener('blur', () => {
        const lid = bt.dataset.layer;
        const bi  = parseInt(bt.dataset.beatIdx);
        if (!n.layers[lid]) return;
        if (!n.layers[lid].beats) n.layers[lid].beats = [];
        if (bt.textContent.trim() === '') {
          n.layers[lid].beats.splice(bi, 1);
          renderBoard(); commitState();
        } else {
          n.layers[lid].beats[bi] = bt.textContent;
          commitState();
        }
      });
      bt.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          bt.blur();
          // focus next beat-text or add-beat button
          const allBeats = [...el.querySelectorAll(`.beat-text[data-layer="${bt.dataset.layer}"]`)];
          const idx = allBeats.indexOf(bt);
          if (allBeats[idx+1]) allBeats[idx+1].focus();
          else el.querySelector(`.btn-add-beat[data-layer="${bt.dataset.layer}"]`)?.focus();
        }
        if (e.key === 'Escape') { bt.blur(); }
      });
    });

    el.querySelectorAll('.beat-del').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const lid = btn.dataset.layer;
        const bi  = parseInt(btn.dataset.beatIdx);
        if (n.layers[lid] && n.layers[lid].beats) {
          n.layers[lid].beats.splice(bi, 1);
          commitState(); renderBoard();
        }
      });
    });

    el.querySelectorAll('.btn-add-beat').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const lid = btn.dataset.layer;
        if (!n.layers[lid]) n.layers[lid] = { content:'', comments:[], beats:[] };
        if (!n.layers[lid].beats) n.layers[lid].beats = [];
        n.layers[lid].beats.push('');
        commitState(); renderBoard();
        setTimeout(() => {
          const nodeEl = canvas.querySelector(`.node[data-id="${n.id}"]`);
          if (!nodeEl) return;
          const beats = [...nodeEl.querySelectorAll(`.beat-text[data-layer="${lid}"]`)];
          if (beats.length) { beats[beats.length-1].focus(); }
        }, 50);
      });
    });

    const uEdges = el.querySelector('.btn-unlink-edges');
    if (uEdges) uEdges.addEventListener('click', () => { scene.edges = scene.edges.filter(x=>x.from!==n.id&&x.to!==n.id); commitState(); renderBoard(); });
    const dNode = el.querySelector('.btn-del-node');
    if (dNode) dNode.addEventListener('click', () => {
      if (!confirm(`Удалить событие «${n.title}»?`)) return;
      scene.nodes = scene.nodes.filter(x=>x.id!==n.id);
      scene.edges = scene.edges.filter(x=>x.from!==n.id&&x.to!==n.id);
      commitState(); renderAll();
    });

    el.querySelectorAll('.port').forEach(p => {
      p.addEventListener('mousedown', e => {
        e.stopPropagation(); e.preventDefault();
        if (p.dataset.port==='out') { ip.mode='drawEdge'; ip.activeId=n.id; }
      });
      p.addEventListener('mouseup', e => {
        e.stopPropagation();
        if (ip.mode==='drawEdge' && p.dataset.port==='in' && ip.activeId !== n.id) {
          if (!scene.edges.some(ed=>ed.from===ip.activeId && ed.to===n.id)) { scene.edges.push({from:ip.activeId, to:n.id}); commitState(); }
        }
        ip.mode = null; renderEdges();
      });
    });

    canvas.appendChild(el);
  }

  function renderEdges(eX, eY) {
    svg.innerHTML='';
    const scene = getActiveScene(); if (!scene) return;
    let mx=3000,my=3000;
    scene.nodes.forEach(n=>{mx=Math.max(mx,n.x+800);my=Math.max(my,n.y+800);});
    svg.setAttribute('width',mx); svg.setAttribute('height',my);

    scene.edges.forEach(ed=>{
      const a=getRect(ed.from),b=getRect(ed.to); if(!a||!b) return;
      const nFrom=scene.nodes.find(x=>x.id===ed.from);
      const x1=a.x+a.w,y1=a.y+a.h/2,x2=b.x,y2=b.y+b.h/2;
      const dx=Math.max(80,Math.abs(x2-x1)*0.6);
      const d=`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('stroke',nFrom?nFrom.color:'#6366f1');
      p.setAttribute('stroke-width','3');p.setAttribute('stroke-linecap','round');
      p.style.pointerEvents='stroke';p.style.cursor='pointer';
      p.addEventListener('click',e=>{e.stopPropagation();if(confirm('Удалить связь?')){scene.edges=scene.edges.filter(x=>!(x.from===ed.from&&x.to===ed.to));commitState();renderEdges();}});
      svg.appendChild(p);
    });

    if(ip.mode==='drawEdge'&&eX&&eY){
      const a=getRect(ip.activeId); if(a){
        const vr=viewport.getBoundingClientRect();
        const cx=(eX-vr.left-view.x)/view.zoom,cy=(eY-vr.top-view.y)/view.zoom;
        const x1=a.x+a.w,y1=a.y+a.h/2,dx=Math.max(80,Math.abs(cx-x1)*0.6);
        const d=`M${x1},${y1} C${x1+dx},${y1} ${cx-dx},${cy} ${cx},${cy}`;
        const p=document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('stroke','#fff');p.setAttribute('stroke-width','2');p.setAttribute('stroke-dasharray','8,6');
        svg.appendChild(p);
      }
    }
  }

  function getRect(id){
    const scene = getActiveScene(); if (!scene) return null;
    let el = canvas.querySelector(`.node[data-id="${id}"]`);
    if (!el) {
      el = canvas.querySelector(`.text-node[data-tid="${id}"]`);
      if (!el) return null;
      const t = scene.texts.find(x=>x.id===id); if(!t) return null;
      return { x:t.x, y:t.y, w:el.offsetWidth, h:el.offsetHeight };
    }
    const n = scene.nodes.find(x=>x.id===id); if(!n) return null;
    return { x:n.x, y:n.y, w:el.offsetWidth, h:el.offsetHeight };
  }
  function applyView(){ canvas.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.zoom})`; document.getElementById('z-val').textContent=Math.round(view.zoom*100)+'%'; }

  // ── GLOBAL EVENTS ───────────────────────────────────────────────────────────
  function setupEvents(){
    viewport.addEventListener('mousedown',e=>{
      if(e.target.closest('.node') || e.target.closest('.text-node')) return;

      if(e.shiftKey) {
        if(!e.ctrlKey && !e.metaKey) document.querySelectorAll('.text-node.selected, .node.selected').forEach(x=>x.classList.remove('selected'));
        const vr = viewport.getBoundingClientRect();
        ip = { mode: 'selectBox', startX: e.clientX, startY: e.clientY, vLeft: vr.left, vTop: vr.top };
        selBox.style.display = 'block';
        selBox.style.left = (e.clientX - vr.left) + 'px';
        selBox.style.top = (e.clientY - vr.top) + 'px';
        selBox.style.width = '0px'; selBox.style.height = '0px';
      } else {
        document.querySelectorAll('.node.selected,.text-node.selected').forEach(x=>x.classList.remove('selected'));
        ip={mode:'pan',startX:e.clientX,startY:e.clientY,origX:view.x,origY:view.y};
        viewport.classList.add('grabbing'); colorPicker.style.display='none';
      }
    });

    window.addEventListener('mousemove',e=>{
      if(!ip.mode) return;
      const vr=viewport.getBoundingClientRect();
      if(ip.mode==='pan'){
        view.x=ip.origX+(e.clientX-ip.startX); view.y=ip.origY+(e.clientY-ip.startY); applyView();
      } else if(ip.mode==='selectBox'){
        const x = Math.min(e.clientX, ip.startX);
        const y = Math.min(e.clientY, ip.startY);
        const w = Math.abs(e.clientX - ip.startX);
        const h = Math.abs(e.clientY - ip.startY);
        selBox.style.left = (x - ip.vLeft) + 'px'; selBox.style.top = (y - ip.vTop) + 'px';
        selBox.style.width = w + 'px'; selBox.style.height = h + 'px';

        canvas.querySelectorAll('.node, .text-node').forEach(el => {
          const rect = el.getBoundingClientRect();
          if(!(rect.right < x || rect.left > x+w || rect.bottom < y || rect.top > y+h)) {
             el.classList.add('selected');
          } else {
             el.classList.remove('selected');
          }
        });
      } else if(ip.mode==='dragMulti'){
        const dx = (e.clientX - ip.startX) / view.zoom;
        const dy = (e.clientY - ip.startY) / view.zoom;
        ip.multiNodes.forEach(m => {
          m.item.x = m.origX + dx; m.item.y = m.origY + dy;
          m.dom.style.left = m.item.x + 'px'; m.dom.style.top = m.item.y + 'px';
        });
        renderEdges();
      } else if(ip.mode==='resizeText'){
        const scene = getActiveScene();
        const t = scene && scene.texts.find(x=>x.id===ip.activeId); if(!t) return;
        const dw=(e.clientX-ip.startX)/view.zoom;
        const dh=(e.clientY-ip.startY)/view.zoom;
        t.w=Math.max(60,ip.origW+dw); t.h=Math.max(ip.origFS*1.4,ip.origH+dh);
        const el=canvas.querySelector(`.text-node[data-tid="${t.id}"]`);
        if(el){ el.style.width=t.w+'px'; el.style.height=t.h+'px'; }
      } else if(ip.mode==='spawnTpl'){
        ghost.style.left=(e.clientX-ghost.offsetWidth/2)+'px'; ghost.style.top=(e.clientY-10)+'px';
      } else if(ip.mode==='drawEdge'){
        renderEdges(e.clientX,e.clientY);
      }
    });

    window.addEventListener('mouseup',e=>{
      const vr=viewport.getBoundingClientRect();
      if(ip.mode==='pan'){ viewport.classList.remove('grabbing'); }
      else if(ip.mode==='selectBox') { selBox.style.display = 'none'; }
      else if(ip.mode==='resizeText'){ commitState(); }
      else if(ip.mode==='dragMulti'){ commitState(); }
      else if(ip.mode==='spawnTpl'){
        ghost.style.display='none';
        if(e.clientX>vr.left&&e.clientX<vr.right&&e.clientY>vr.top&&e.clientY<vr.bottom){
          const cvX=(e.clientX-vr.left-view.x)/view.zoom-150;
          const cvY=(e.clientY-vr.top-view.y)/view.zoom-20;
          spawnFromTemplate(ip.sourceTpl, cvX, cvY);
        }
      } else if(ip.mode==='drawEdge'){ renderEdges(); }
      ip.mode=null;
    });

    viewport.addEventListener('wheel',e=>{
      e.preventDefault(); const dz=-e.deltaY*0.001; const nz=Math.max(0.2,Math.min(2.5,view.zoom*(1+dz)));
      const vr=viewport.getBoundingClientRect(); const mx=e.clientX-vr.left,my=e.clientY-vr.top;
      view.x=mx-(mx-view.x)*(nz/view.zoom); view.y=my-(my-view.y)*(nz/view.zoom); view.zoom=nz; applyView();
    },{passive:false});

    colorPicker.querySelectorAll('.cp-swatch').forEach(sw=>{
      sw.addEventListener('click',e=>{
        if(cpCallback){cpCallback(e.target.dataset.c);cpCallback=null;}
        colorPicker.style.display='none';
      });
    });
    document.getElementById('cp-custom').addEventListener('input',e=>{
      if(cpCallback){cpCallback(e.target.value);cpCallback=null;} colorPicker.style.display='none';
    });
    document.addEventListener('mousedown',e=>{ if(!colorPicker.contains(e.target)) colorPicker.style.display='none'; });

    window.addEventListener('keydown',e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){if(document.activeElement.isContentEditable)return;e.preventDefault();undo();}
    });
  }

  function addEvent() {
    const scene = getActiveScene(); if (!scene) return;
    const pt = { x: -view.x/view.zoom + 200, y: -view.y/view.zoom + 100 };
    spawnFromTemplate({ kind: 'event' }, pt.x, pt.y);
  }

  function addTextNode() {
    const scene = getActiveScene(); if (!scene) return;
    if (!scene.texts) scene.texts = [];
    const pt = { x: -view.x/view.zoom + 150, y: -view.y/view.zoom + 80 };
    spawnFromTemplate({ kind: 'text' }, pt.x, pt.y);
  }

  function spawnFromTemplate(tpl, x, y) {
    const scene = getActiveScene(); if (!scene) return;
    if (tpl.kind === 'text') {
      if (!scene.texts) scene.texts = [];
      const t = { id: guid(), x, y, w: 300, h: 60, fontSize: 36, color: '#f3f4f6', content: 'Заголовок' };
      scene.texts.push(t); commitState(); renderBoard();
      setTimeout(() => {
        const el = canvas.querySelector(`.text-node[data-tid="${t.id}"] .text-node-content`);
        if (el) { el.focus(); const r = document.createRange(); const s = window.getSelection(); r.selectNodeContents(el); s.removeAllRanges(); s.addRange(r); }
      }, 60);
    } else {
      const id = guid();
      const layers = {};
      (scene.visibleLayers || DEFAULT_LAYER_IDS).forEach(lid => { layers[lid] = { content:'', comments:[] }; });
      scene.nodes.push({ id, x, y, title: 'НОВОЕ СОБЫТИЕ', color: '#6366f1', comments: [], layers });
      commitState(); renderAll();
    }
  }

  // ── APPLY DEFAULT BEATS ─────────────────────────────────────────────────────
  function applyDefaultBeats() {
    let applied = 0;
    project.scenes.forEach(scene => {
      scene.nodes.forEach(node => {
        const nodeDef = DEFAULT_BEATS[node.id];
        if (!nodeDef) return;
        Object.entries(nodeDef).forEach(([layerId, beats]) => {
          if (!node.layers[layerId]) node.layers[layerId] = { content: '', comments: [], beats: [] };
          if (!node.layers[layerId].beats) node.layers[layerId].beats = [];
          // Применяем только если биты ещё пустые (не перезаписываем ручную работу)
          if (node.layers[layerId].beats.length === 0) {
            node.layers[layerId].beats = [...beats];
            applied++;
          }
        });
      });
    });
    if (applied > 0) {
      commitState(); renderBoard();
      console.log(`Биты применены к ${applied} слоям.`);
    } else {
      alert('Все слои уже содержат биты. Для повторного заполнения очисти биты вручную.');
    }
  }

  init();
  return {
    addEvent, addTextNode, addScene,
    resetView: () => { view = { x:40, y:40, zoom:0.85 }; applyView(); },
    undo, clearScene, resetProject, exportProject, importProject,
    applyDefaultBeats, openDialoguesTable
  };
})();
</script>
